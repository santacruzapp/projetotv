<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Corporativa</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <video
        id="video-player"
        class="video-player"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
      ></video>

      <section id="status-card" class="status-card" aria-live="polite">
        <p id="status-text" class="status-text">Carregando video...</p>
      </section>

      <button id="play-overlay" class="play-overlay hidden" type="button">
        Toque para iniciar o video
      </button>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
